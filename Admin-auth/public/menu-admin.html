<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#101828;
      --muted:#667085;
      --border:#e5e7eb;
      --shadow:0 10px 24px rgba(16,24,40,.06);
      --brand:#2563eb;
      --brand2:#1e40af;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Noto Sans Thai",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .page{
      max-width:1100px;
      margin:28px auto;
      padding:0 18px 36px;
    }

    .heroGrid{
      display:grid;
      grid-template-columns: 1.6fr .9fr;
      gap:16px;
      margin-bottom:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .heroCard{
      background:linear-gradient(135deg, #dbeafe 0%, #ccfbf1 100%);
      border:none;
      min-height:160px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .brandRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brandLeft{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logoBubble{
      width:36px;
      height:36px;
      border-radius:12px;
      background:rgba(255,255,255,.82);
      display:grid;
      place-items:center;
      font-weight:800;
      box-shadow:0 10px 20px rgba(16,24,40,.08);
    }

    .brandName{
      font-size:15px;
      font-weight:800;
    }

    .notifBubble{
      width:32px;
      height:32px;
      border-radius:12px;
      background:rgba(255,255,255,.82);
      display:grid;
      place-items:center;
      box-shadow:0 10px 20px rgba(16,24,40,.08);
      font-size:15px;
    }

    .heroMain{
      display:flex;
      align-items:flex-start;
      gap:16px;
      margin-top:12px;
    }

    .bigAvatar{
      width:46px;
      height:46px;
      border-radius:999px;
      background:rgba(255,255,255,.68);
      display:grid;
      place-items:center;
      font-weight:800;
      flex:0 0 auto;
    }

    .helloText h1{
      margin:0;
      font-size:18px;
      font-weight:800;
    }

    .helloText p{
      margin:4px 0 0;
      font-size:13px;
      color:#475467;
    }

    .heroPills{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .metaPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(255,255,255,.95);
      font-size:12px;
      font-weight:700;
      color:#111827;
      max-width:100%;
    }

    .accountCard{
      min-height:160px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .smallLabel{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#98a2b3;
      font-weight:800;
      margin-bottom:8px;
    }

    .accountName{
      font-size:16px;
      font-weight:800;
      margin:0;
    }

    .accountSub{
      font-size:13px;
      color:var(--muted);
      margin-top:2px;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      font-size:13px;
      transition:.12s ease;
    }

    .btnGhost{
      background:#fff;
      color:var(--brand);
      border:1px solid rgba(37,99,235,.18);
    }

    .btnGhost:hover{
      background:#f8fbff;
      border-color:rgba(37,99,235,.28);
    }

    .mainGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }

    .stack{
      display:grid;
      gap:12px;
    }

    .sectionTitle{
      margin:0 0 10px;
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#98a2b3;
      font-weight:800;
    }

    .quickGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .quickCard{
      border:1px solid var(--border);
      border-radius:18px;
      background:#fff;
      min-height:112px;
      padding:14px;
      box-shadow:var(--shadow);
      cursor:pointer;
      transition:.12s ease;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .quickCard:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 24px rgba(16,24,40,.07);
      border-color:#dbe4ff;
    }

    .quickTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .quickIcon{
      width:34px;
      height:34px;
      border-radius:12px;
      background:#f8fafc;
      border:1px solid rgba(0,0,0,.05);
      display:grid;
      place-items:center;
      font-size:16px;
    }

    .quickPlus{
      width:28px;
      height:28px;
      border-radius:10px;
      background:#f8fafc;
      border:1px solid rgba(0,0,0,.05);
      display:grid;
      place-items:center;
      font-weight:800;
      color:#111827;
    }

    .quickBody b{
      display:block;
      margin-top:12px;
      font-size:14px;
    }

    .quickBody span{
      display:block;
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .recentCard{
      min-height:350px;
      display:flex;
      flex-direction:column;
    }

    .recentHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .recentHead h3{
      margin:0;
      font-size:14px;
      font-weight:800;
    }

    .recentHint{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .recentList{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:390px;
      overflow:auto;
      padding-right:4px;
    }

    .jobRow{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .jobRow:hover{
      border-color:#dbe4ff;
      box-shadow:0 8px 20px rgba(16,24,40,.05);
    }

    .jobInfo{
      min-width:0;
      flex:1 1 auto;
    }

    .jobNo{
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:3px;
    }

    .jobMeta{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .statusPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      background:#fff7ed;
      border:1px solid rgba(202,138,4,.22);
      color:#92400e;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:currentColor;
      flex:0 0 auto;
    }

    .openBtn{
      appearance:none;
      border:1px solid rgba(37,99,235,.18);
      background:#fff;
      color:var(--brand);
      border-radius:12px;
      padding:9px 14px;
      font-weight:800;
      cursor:pointer;
      flex:0 0 auto;
    }

    .openBtn:hover{
      background:#f8fbff;
      border-color:rgba(37,99,235,.28);
    }

    .emptyNote{
      color:var(--muted);
      font-size:13px;
      padding:6px 2px 0;
    }

    @media (max-width: 940px){
      .heroGrid,
      .mainGrid,
      .quickGrid{
        grid-template-columns:1fr;
      }
    }
	
	.quickPlus{
  cursor:pointer;
  transition:0.15s;
}

.quickPlus:hover{
  background:#eef2ff;
  border-color:#c7d2fe;
  transform:scale(1.05);
}

  </style>
</head>
<body>
  <div class="page">

    <div class="heroGrid">
      <div class="card heroCard">
        <div class="brandRow">
          <div class="brandLeft">
            <div class="logoBubble">O</div>
            <div>
              <div class="brandName">Octopus Media</div>
            </div>
          </div>
          <div class="notifBubble">🔔</div>
        </div>

        <div class="heroMain">
          <div class="bigAvatar">O</div>
          <div class="helloText">
            <h1 id="helloText">Hello</h1>
            <p>Let&apos;s get you started.</p>

            <div class="heroPills">
              <div class="metaPill" id="groupPill">Group: —</div>
              <div class="metaPill" id="idPill">ID: —</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card accountCard">
        <div>
          <div class="smallLabel">Account</div>
          <div class="accountName">Signed in</div>
          <div class="accountSub" id="accountSub">—</div>
        </div>
        <div>
          <button class="btn btnGhost" id="btnLogout">Logout</button>
        </div>
      </div>
    </div>

    <div class="mainGrid">
      <div class="stack">
        <div>
          <div class="sectionTitle">Quick Actions</div>
          <div class="quickGrid">
            <div class="quickCard" id="btnApprovals">
              <div class="quickTop">
                <div class="quickIcon">✅</div>
              </div>
              <div class="quickBody">
                <b>Approvals</b>
                <span>Approvals queue and requests</span>
              </div>
            </div>

            <div class="quickCard" id="btnOrders">
  <div class="quickTop">
    <div class="quickIcon">🚚</div>

    <div class="quickPlus" id="btnCreateOrder">+</div>
  </div>

  <div class="quickBody">
    <b>Orders</b>
    <span>Open orders and progress</span>
  </div>
</div>

            <div class="quickCard" id="btnManageJobs">
              <div class="quickTop">
                <div class="quickIcon">🗂️</div>
              </div>
              <div class="quickBody">
                <b>Manage Jobs</b>
                <span>Edit stages, status and assignments</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card recentCard">
        <div class="recentHead">
          <h3>Recent Jobs</h3>
          <div class="recentHint" id="jobsCount">Loading…</div>
        </div>

        <div id="recentJobs" class="recentList">
          <div class="emptyNote">Loading recent jobs…</div>
        </div>
      </div>
    </div>

  </div>

<script>
(() => {
  const API = "/admin/api";

  function getAccessToken(){
    return sessionStorage.getItem("accessToken") || "";
  }

  async function apiFetch(url, options = {}) {
    const token = getAccessToken();

    if (!token) {
      location.href = "/admin/login.html";
      return null;
    }

    const headers = { ...(options.headers || {}) };
    headers["Authorization"] = "Bearer " + token;

    const res = await fetch(url, {
      ...options,
      headers,
      credentials: "include"
    });

    if (res.status === 401) {
      sessionStorage.removeItem("accessToken");
      location.href = "/admin/login.html";
      return null;
    }

    return res;
  }

  async function apiGetJson(url){
    const r = await apiFetch(url, { method:"GET" });
    if (!r) return null;
    const j = await r.json().catch(()=>null);
    if (!r.ok) throw new Error(j?.message || j?.error || "request_failed");
    return j;
  }

  function esc(str){
    return String(str ?? "").replace(/[&<>"']/g, (m) => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[m]));
  }

  async function loadMe(){
    const data = await apiGetJson(API + "/me");
    const user = data?.user || {};

    const displayName = user.display_name || user.displayName || user.username || "User";
    const group = user.groupKey || user.group || "—";
    const userId = user.id || "—";

    document.getElementById("helloText").textContent = `Hello ${displayName}`;
    document.getElementById("accountSub").textContent = user.username || displayName;
    document.getElementById("groupPill").textContent = `Group: ${group}`;
    document.getElementById("idPill").textContent = `ID: ${userId}`;
  }

  function renderStatus(status){
    return `
      <span class="statusPill">
        <span class="dot"></span>
        ${esc(status || "-")}
      </span>
    `;
  }

  async function loadRecentJobs(){
    const box = document.getElementById("recentJobs");
    const count = document.getElementById("jobsCount");

    box.innerHTML = `<div class="emptyNote">Loading recent jobs…</div>`;

    const data = await apiGetJson(API + "/oms/orders/recent?limit=10");
    const jobs = data?.jobs || [];

    count.textContent = `${jobs.length} item${jobs.length === 1 ? "" : "s"}`;

    if (!jobs.length){
      box.innerHTML = `<div class="emptyNote">No recent jobs found.</div>`;
      return;
    }

    box.innerHTML = jobs.map(j => {
      const id = j.id ?? j.job_id;
      const jobNo = j.job_no || ("#" + id);
      const project = j.project_name || "-";
      const type = j.job_type || "-";
      const customer = j.customer?.display_name || "-";

      return `
        <div class="jobRow">
          <div class="jobInfo">
            <div class="jobNo">${esc(jobNo)}</div>
            <div class="jobMeta">${esc(project)} • ${esc(type)}</div>
            <div class="jobMeta">Customer: ${esc(customer)}</div>
          </div>

          ${renderStatus(j.status)}

          <button class="openBtn" data-job-id="${esc(id)}">Open</button>
        </div>
      `;
    }).join("");

    box.querySelectorAll(".openBtn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const id = btn.getAttribute("data-job-id");
        location.href = "/admin/app.html?jobKey=" + encodeURIComponent(id);
      });
    });

    box.querySelectorAll(".jobRow").forEach((row, idx) => {
      row.addEventListener("click", () => {
        const btn = row.querySelector(".openBtn");
        const id = btn?.getAttribute("data-job-id");
        if (id) location.href = "/admin/app.html?jobKey=" + encodeURIComponent(id);
      });
    });
  }

  async function logout(){
    try{
      await apiFetch(API + "/auth/logout", { method:"POST" });
    }catch(e){}
    sessionStorage.removeItem("accessToken");
    location.href = "/admin/login.html";
  }

  document.getElementById("btnLogout").addEventListener("click", logout);

  document.getElementById("btnManageJobs").addEventListener("click", () => {
    location.href = "/admin/app.html";
  });

  // Orders card → open job list
document.getElementById("btnOrders").addEventListener("click", () => {
  location.href = "/admin/app.html";
});

// + button → create job
document.getElementById("btnCreateOrder").addEventListener("click", (e) => {
  e.stopPropagation(); // prevents card click
  location.href = "/admin/admin-job-create.html";
});

  document.getElementById("btnApprovals").addEventListener("click", () => {
    alert("Approvals page not linked yet.");
  });

  (async function boot(){
    try{
      await loadMe();
      await loadRecentJobs();
    }catch(e){
      console.error(e);
      sessionStorage.removeItem("accessToken");
      location.href = "/admin/login.html";
    }
  })();
})();
</script>
</body>
</html>
