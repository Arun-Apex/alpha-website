<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Octopus Production System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Thai + English friendly -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css" />
  
</head>

<body>
  <main class="screen">
    <!-- Soft background blobs -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <section class="hero">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <!-- replace with your logo image if you want -->
          <span>O</span>
        </div>

        <div class="brand-title">
          <div class="brand-name">OCTOPUS MEDIA SOLUTIONS</div>
          <div class="brand-sub">
            <span class="th">เลือกหน้าที่ของคุณเพื่อเข้าใช้งานระบบ</span>
            <span class="en">Select your role to enter the system</span>
          </div>
        </div>
      </div>

      <div class="cards" id="groupList">
        <!-- Static demo cards (will be replaced by API if enabled) -->
        <button class="role-card" data-group="supervisor">
          <div class="role-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2"/>
              <path d="M20 21a8 8 0 1 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="role-text">
            <div class="role-title">
              <span class="th">Supervisor / Manager</span>
              <span class="en">Supervisor / Manager</span>
            </div>
            <div class="role-desc">
              <span class="th">จัดการระบบ และปรับสถานะงานได้</span>
              <span class="en">Manage system and update job status</span>
            </div>
          </div>
          <div class="role-arrow" aria-hidden="true">›</div>
        </button>

        <button class="role-card" data-group="admin">
          <div class="role-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 2 20 6v7c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M9 12l2 2 4-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="role-text">
            <div class="role-title">
              <span class="th">แอดมิน</span>
              <span class="en">Administrator</span>
            </div>
            <div class="role-desc">
              <span class="th">จัดการระบบ และปรับสถานะงานได้</span>
              <span class="en">Full system administration</span>
            </div>
          </div>
          <div class="role-arrow" aria-hidden="true">›</div>
        </button>

        <button class="role-card" data-group="graphic">
          <div class="role-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 20h4l10-10a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M13 7l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="role-text">
            <div class="role-title">
              <span class="th">กราฟิก</span>
              <span class="en">Graphic Designer</span>
            </div>
            <div class="role-desc">
              <span class="th">วางแบบและคอมพิวเตอร์แบบ</span>
              <span class="en">Design and artwork preparation</span>
            </div>
          </div>
          <div class="role-arrow" aria-hidden="true">›</div>
        </button>

        <button class="role-card" data-group="print">
          <div class="role-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 8V4h10v4" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M7 17h10v3H7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M6 10h12a3 3 0 0 1 3 3v2h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6 15H3v-2a3 3 0 0 1 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="role-text">
            <div class="role-title">
              <span class="th">ช่างพิมพ์</span>
              <span class="en">Printing Technician</span>
            </div>
            <div class="role-desc">
              <span class="th">เช็คงานพิมพ์และแจ้งสถานะงานพิมพ์เสร็จ</span>
              <span class="en">Print production and update completion status</span>
            </div>
          </div>
          <div class="role-arrow" aria-hidden="true">›</div>
        </button>

        <button class="role-card" data-group="install">
          <div class="role-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 20h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6 20V9l6-4 6 4v11" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M10 20v-6h4v6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="role-text">
            <div class="role-title">
              <span class="th">ช่างติดตั้ง</span>
              <span class="en">Installation Technician</span>
            </div>
            <div class="role-desc">
              <span class="th">ติดตั้ง และทำงานหน้างานตามรายการ</span>
              <span class="en">On-site installation and task execution</span>
            </div>
          </div>
          <div class="role-arrow" aria-hidden="true">›</div>
        </button>
      </div>

      <div class="help">
        <a class="help-link" href="#">
          <span class="th">เข้าใช้งานไม่ได้?</span>
          <span class="en">Need help?</span>
        </a>
      </div>

      <footer class="footer">
        <div class="footer-line">OCTOPUS PRODUCTION SYSTEM V1.0</div>
      </footer>
    </section>
  </main>

  <script>
    // Later: fetch('/api/usergroups') and render dynamically.
    // For now: keep the design stable and just store selection.
    document.querySelectorAll('.role-card').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.getAttribute('data-group');
        localStorage.setItem('selectedGroupKey', key);
		localStorage.setItem('selectedGroupNameTh', btn.querySelector('.role-title .th').textContent.trim());
		localStorage.setItem('selectedGroupNameEn', btn.querySelector('.role-title .en').textContent.trim());
        // route to login page (create /login.html next)
        window.location.href = './login.html';
      });
    });
  </script>
</body>
</html>
