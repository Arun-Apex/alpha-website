<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login • Octopus Production System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- IMPORTANT: relative path for /admin/ -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <main class="screen">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <section class="hero">
      <div class="brand" style="padding-bottom:10px;">
        <div class="brand-logo" aria-hidden="true"><span>O</span></div>
        <div class="brand-title">
          <div class="brand-name">OCTOPUS MEDIA SOLUTIONS</div>
          <div class="brand-sub">
            <span class="th">เข้าสู่ระบบ</span>
            <span class="en">Sign in to continue</span>
          </div>
        </div>
      </div>

      <div class="login-card">
        <div class="login-head">
          <div class="login-role" id="selectedRoleLabel">
            <div class="th">กำลังเข้าสู่: -</div>
            <div class="en">Signing in as: -</div>
          </div>

          <button class="ghost-btn" id="changeRoleBtn" type="button">
            <span class="th">เปลี่ยนกลุ่ม</span>
            <span class="en">Change role</span>
          </button>
        </div>

        <form id="loginForm" class="form">
          <label class="field">
            <div class="label">
              <span class="th">ชื่อผู้ใช้งาน</span>
              <span class="en">Username</span>
            </div>
            <input id="username" name="username" type="text" autocomplete="username" required placeholder="username" />
          </label>

          <label class="field">
            <div class="label">
              <span class="th">รหัสผ่าน</span>
              <span class="en">Password</span>
            </div>
            <div class="pw-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
              <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">Show</button>
            </div>
          </label>

          <div class="row">
            <label class="check">
              <input id="remember" type="checkbox" />
              <span>
                <span class="th">จดจำฉัน</span>
                <span class="en">Remember me</span>
              </span>
            </label>

            <a class="link" href="#" id="helpLink">
              <span class="th">ลืมรหัสผ่าน?</span>
              <span class="en">Forgot password?</span>
            </a>
          </div>

          <div id="errorBox" class="error" hidden></div>

          <button id="loginBtn" class="primary-btn" type="submit">
            <span class="th">เข้าสู่ระบบ</span>
            <span class="en">Login</span>
          </button>

          <div class="hint">
            <span class="th">ระบบจะพาคุณไปยังหน้าที่เหมาะสมอัตโนมัติ</span>
            <span class="en">You’ll be redirected to the correct page automatically</span>
          </div>
        </form>
      </div>

      <footer class="footer" style="margin-top:18px;">
        <div class="footer-line">OCTOPUS PRODUCTION SYSTEM V1.0</div>
      </footer>
    </section>
  </main>

  <style>
    .login-card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .login-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .login-role .th{ font-weight:700; font-size:13px; }
    .login-role .en{ font-size:12px; color: var(--muted); margin-top:2px; }

    .ghost-btn{
      border:0;
      background: rgba(47,107,255,.10);
      color: var(--primary);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:700;
      display:flex;
      flex-direction:column;
      gap:1px;
      line-height:1.1;
      box-shadow: var(--shadow2);
    }
    .ghost-btn .en{ font-size:11px; font-weight:600; color:#64748b; }

    .form{ display:flex; flex-direction:column; gap:12px; }
    .field .label{
      display:flex;
      flex-direction:column;
      gap:1px;
      font-weight:700;
      font-size:12.5px;
    }
    .field .label .en{ font-weight:600; color: var(--muted); font-size:11.5px; }

    input{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(15,23,42,.10);
      outline: none;
      font-size: 14px;
      margin-top: 8px;
      background: #fff;
      transition: box-shadow .12s ease, border-color .12s ease;
    }
    input:focus{
      border-color: rgba(47,107,255,.45);
      box-shadow: 0 0 0 4px rgba(47,107,255,.10);
    }

    .pw-wrap{ position:relative; }
    .pw-toggle{
      position:absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-10%);
      border:0;
      background: transparent;
      color: #64748b;
      font-weight:700;
      cursor:pointer;
      padding: 8px 6px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top: 2px;
    }

    .check{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12.5px;
      color: var(--muted);
      user-select:none;
    }
    .check input{ width:auto; margin:0; }
    .check .en{ display:block; font-size:11.5px; color: var(--muted2); margin-top:2px; }

    .link{
      text-decoration:none;
      display:flex;
      flex-direction:column;
      gap:1px;
      font-size:12.5px;
      color: var(--primary);
      font-weight:700;
      text-align:right;
      line-height:1.1;
    }
    .link .en{ font-size:11.5px; font-weight:600; color:#64748b; }

    .primary-btn{
      border:0;
      background: var(--primary);
      color:#fff;
      padding: 12px 14px;
      border-radius: 16px;
      font-weight:800;
      cursor:pointer;
      box-shadow: 0 14px 28px rgba(47,107,255,.25);
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1.05;
    }
    .primary-btn .en{ font-size:12px; font-weight:700; opacity:.92; }
    .primary-btn[disabled]{ opacity:.7; cursor:not-allowed; }

    .error{
      background: rgba(239,68,68,.10);
      border: 1px solid rgba(239,68,68,.25);
      color: #b91c1c;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12.5px;
      line-height:1.35;
      white-space: pre-line;
    }

    .hint{
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:2px;
      font-size:11.5px;
      color: var(--muted2);
      margin-top: 4px;
    }
  </style>

  <!-- IMPORTANT: relative path for /admin/ -->
  <script src="./js/login.js"></script>
</body>
</html>
